services:
  yawnless:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${YAWNLESS_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      YAWNLESS_HOME: "/yawnless"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      YAWNLESS_DEPLOYMENT_MODE: "authenticated"
      YAWNLESS_DEPLOYMENT_EXPOSURE: "private"
      YAWNLESS_PUBLIC_URL: "${YAWNLESS_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - "${YAWNLESS_DATA_DIR:-./data/docker-yawnless}:/yawnless"
